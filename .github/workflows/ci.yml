name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: lottusdb
          MYSQL_USER: lottus-devuser
          MYSQL_PASSWORD: "40028922"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/lottusdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: lottus-devuser
      SPRING_DATASOURCE_PASSWORD: "40028922"
      JWT_SECRET: Y2ktdGVzdC1zZWNyZXQta2V5LWZvci1naXRodWItYWN0aW9ucy1vbmx5LXBsZWFzZQ==
      GOOGLE_CLIENT_ID: fake-client-id
      GOOGLE_CLIENT_SECRET: fake-client-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build & Test
        run: ./mvnw verify --batch-mode --no-transfer-progress
